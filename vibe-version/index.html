<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TaskFlow — Task Manager</title>
    <meta name="description" content="A personal task manager to add, complete, and filter your tasks." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      /* ============================================================
         CSS DESIGN SYSTEM — Generated by Lovable (vibe output)
         ============================================================ */
      :root {
        --color-bg-primary: #0a0a12;
        --color-bg-secondary: #12121e;
        --color-bg-card: rgba(255, 255, 255, 0.05);
        --color-bg-card-hover: rgba(255, 255, 255, 0.08);
        --color-border: rgba(255, 255, 255, 0.1);
        --color-border-active: rgba(124, 58, 237, 0.6);
        --color-accent-primary: #7c3aed;
        --color-accent-secondary: #a855f7;
        --color-accent-gradient: linear-gradient(135deg, #7c3aed, #a855f7);
        --color-text-primary: #f8fafc;
        --color-text-secondary: #94a3b8;
        --color-text-muted: #64748b;
        --color-completed-text: #475569;
        --color-success: #10b981;
        --color-danger: #ef4444;
        --radius-sm: 8px;
        --radius-md: 12px;
        --radius-lg: 20px;
        --radius-xl: 28px;
        --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 30px rgba(124, 58, 237, 0.15);
        --transition-fast: 0.15s ease;
        --transition-normal: 0.25s ease;
        --transition-slow: 0.4s ease;
        --font-family-base: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 16px;
        --spacing-lg: 24px;
        --spacing-xl: 32px;
        --spacing-2xl: 48px;
      }

      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        font-size: 16px;
        scroll-behavior: smooth;
      }

      body {
        font-family: var(--font-family-base);
        background-color: var(--color-bg-primary);
        color: var(--color-text-primary);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: var(--spacing-2xl) var(--spacing-md);
        background-image:
          radial-gradient(ellipse at 20% 10%, rgba(124, 58, 237, 0.12) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 90%, rgba(168, 85, 247, 0.08) 0%, transparent 50%);
        background-attachment: fixed;
      }

      /* ============================================================
         APP CONTAINER
         ============================================================ */
      #app-container {
        width: 100%;
        max-width: 600px;
        display: flex;
        flex-direction: column;
        gap: var(--spacing-lg);
      }

      /* ============================================================
         HEADER SECTION
         ============================================================ */
      .app-header {
        text-align: center;
        padding: var(--spacing-lg) 0;
      }

      .app-header__badge {
        display: inline-block;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        color: var(--color-accent-secondary);
        background: rgba(124, 58, 237, 0.15);
        border: 1px solid rgba(124, 58, 237, 0.3);
        padding: 4px 12px;
        border-radius: 100px;
        margin-bottom: var(--spacing-md);
      }

      .app-header__title {
        font-size: 2.25rem;
        font-weight: 700;
        color: var(--color-text-primary);
        letter-spacing: -0.5px;
        line-height: 1.2;
        background: var(--color-accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .app-header__subtitle {
        font-size: 0.9rem;
        color: var(--color-text-muted);
        margin-top: var(--spacing-sm);
        font-weight: 400;
      }

      /* ============================================================
         INPUT SECTION
         ============================================================ */
      .input-section {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--spacing-lg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--shadow-card);
        transition: border-color var(--transition-normal), box-shadow var(--transition-normal);
      }

      .input-section:focus-within {
        border-color: var(--color-border-active);
        box-shadow: var(--shadow-card), var(--shadow-glow);
      }

      .input-section__label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--color-text-muted);
        letter-spacing: 0.8px;
        text-transform: uppercase;
        margin-bottom: var(--spacing-sm);
      }

      .input-section__row {
        display: flex;
        gap: var(--spacing-sm);
        align-items: center;
      }

      .task-input-field {
        flex: 1;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: 14px var(--spacing-md);
        font-family: var(--font-family-base);
        font-size: 0.95rem;
        color: var(--color-text-primary);
        outline: none;
        transition: border-color var(--transition-fast), background var(--transition-fast);
      }

      .task-input-field::placeholder {
        color: var(--color-text-muted);
      }

      .task-input-field:focus {
        border-color: var(--color-accent-primary);
        background: rgba(124, 58, 237, 0.06);
      }

      .btn-add-task {
        background: var(--color-accent-gradient);
        border: none;
        border-radius: var(--radius-md);
        padding: 14px 22px;
        font-family: var(--font-family-base);
        font-size: 0.9rem;
        font-weight: 600;
        color: #fff;
        cursor: pointer;
        white-space: nowrap;
        transition: opacity var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
        box-shadow: 0 4px 15px rgba(124, 58, 237, 0.35);
      }

      .btn-add-task:hover {
        opacity: 0.92;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5);
      }

      .btn-add-task:active {
        transform: translateY(0);
        opacity: 1;
      }

      /* ============================================================
         FILTER BAR
         ============================================================ */
      .filter-bar {
        display: flex;
        gap: var(--spacing-xs);
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        padding: var(--spacing-sm);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      .filter-btn {
        flex: 1;
        background: transparent;
        border: none;
        border-radius: var(--radius-md);
        padding: 10px var(--spacing-sm);
        font-family: var(--font-family-base);
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--color-text-muted);
        cursor: pointer;
        transition: background var(--transition-fast), color var(--transition-fast);
      }

      .filter-btn:hover {
        background: rgba(255, 255, 255, 0.06);
        color: var(--color-text-secondary);
      }

      .filter-btn.filter-btn--active {
        background: var(--color-accent-gradient);
        color: #fff;
        font-weight: 600;
        box-shadow: 0 2px 10px rgba(124, 58, 237, 0.35);
      }

      /* ============================================================
         TASK LIST
         ============================================================ */
      .task-list-wrapper {
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        overflow: hidden;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: var(--shadow-card);
        min-height: 80px;
      }

      .task-list {
        list-style: none;
      }

      .task-item {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        padding: var(--spacing-md) var(--spacing-lg);
        border-bottom: 1px solid var(--color-border);
        cursor: pointer;
        transition: background var(--transition-fast);
        animation: taskSlideIn 0.25s ease forwards;
      }

      @keyframes taskSlideIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .task-item:last-child {
        border-bottom: none;
      }

      .task-item:hover {
        background: var(--color-bg-card-hover);
      }

      .task-item__checkbox {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--color-border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: border-color var(--transition-fast), background var(--transition-fast);
      }

      .task-item--completed .task-item__checkbox {
        background: var(--color-accent-gradient);
        border-color: transparent;
      }

      .task-item__checkbox-tick {
        display: none;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }

      .task-item--completed .task-item__checkbox-tick {
        display: block;
      }

      .task-item__title {
        flex: 1;
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--color-text-primary);
        transition: color var(--transition-fast), text-decoration var(--transition-fast);
        line-height: 1.4;
      }

      .task-item--completed .task-item__title {
        text-decoration: line-through;
        color: var(--color-completed-text);
      }

      /* ============================================================
         EMPTY STATE
         ============================================================ */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--spacing-2xl) var(--spacing-lg);
        color: var(--color-text-muted);
        gap: var(--spacing-sm);
      }

      .empty-state__icon {
        font-size: 2.5rem;
        opacity: 0.4;
        margin-bottom: var(--spacing-sm);
      }

      .empty-state__text {
        font-size: 0.9rem;
        text-align: center;
      }

      /* ============================================================
         TASK COUNT FOOTER
         ============================================================ */
      .task-count-footer {
        text-align: center;
        color: var(--color-text-muted);
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.3px;
        padding: var(--spacing-sm) 0 var(--spacing-lg);
      }

      .task-count-footer span {
        color: var(--color-accent-secondary);
        font-weight: 600;
      }

      /* ============================================================
         RESPONSIVE
         ============================================================ */
      @media (max-width: 480px) {
        .app-header__title { font-size: 1.75rem; }
        .input-section__row { flex-direction: column; }
        .btn-add-task { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="app-container">

      <!-- HEADER -->
      <header class="app-header">
        <div class="app-header__badge">Personal Workspace</div>
        <h1 class="app-header__title">TaskFlow</h1>
        <p class="app-header__subtitle">Stay focused. Ship what matters.</p>
      </header>

      <!-- INPUT -->
      <section class="input-section" aria-label="Add new task">
        <label class="input-section__label" for="task-input-field">New Task</label>
        <div class="input-section__row">
          <input
            id="task-input-field"
            class="task-input-field"
            type="text"
            placeholder="What needs to be done?"
            autocomplete="off"
            maxlength="200"
          />
          <button id="btn-add-task" class="btn-add-task">Add Task</button>
        </div>
      </section>

      <!-- FILTER -->
      <nav class="filter-bar" aria-label="Filter tasks">
        <button id="filter-all" class="filter-btn filter-btn--active" data-filter="all">All</button>
        <button id="filter-active" class="filter-btn" data-filter="active">Active</button>
        <button id="filter-completed" class="filter-btn" data-filter="completed">Completed</button>
      </nav>

      <!-- TASK LIST -->
      <main class="task-list-wrapper" aria-label="Task list">
        <ul id="task-list" class="task-list" role="list"></ul>
        <div id="empty-state" class="empty-state" aria-live="polite">
          <div class="empty-state__icon">✦</div>
          <p class="empty-state__text">No tasks yet.<br/>Add one above to get started.</p>
        </div>
      </main>

      <!-- TASK COUNT -->
      <footer class="task-count-footer" aria-live="polite">
        <span id="task-count-number">0</span> task<span id="task-count-plural">s</span> remaining
      </footer>

    </div>

    <script>
      /* ============================================================
         TASKFLOW APPLICATION — State Management & Rendering
         Generated by: Lovable AI (vibe coding output)
         ============================================================ */

      // ── Application State ──────────────────────────────────────
      const AppState = {
        tasks: [],
        currentFilter: 'all',
        nextId: 1,
      };

      // ── DOM References ─────────────────────────────────────────
      const DOMRefs = {
        taskInputField:   document.getElementById('task-input-field'),
        btnAddTask:       document.getElementById('btn-add-task'),
        taskList:         document.getElementById('task-list'),
        emptyState:       document.getElementById('empty-state'),
        taskCountNumber:  document.getElementById('task-count-number'),
        taskCountPlural:  document.getElementById('task-count-plural'),
        filterBtns:       document.querySelectorAll('.filter-btn'),
      };

      // ── Helper Utilities ───────────────────────────────────────
      function createTaskObject(title) {
        return {
          id: AppState.nextId++,
          title: title.trim(),
          completed: false,
          createdAt: new Date().toISOString(),
        };
      }

      function getFilteredTaskList() {
        const filter = AppState.currentFilter;
        if (filter === 'active')    return AppState.tasks.filter(t => !t.completed);
        if (filter === 'completed') return AppState.tasks.filter(t =>  t.completed);
        return AppState.tasks;
      }

      function countRemainingTasks() {
        return AppState.tasks.filter(t => !t.completed).length;
      }

      // ── Render Functions ───────────────────────────────────────
      function renderTaskListItem(task) {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.completed ? ' task-item--completed' : '');
        li.setAttribute('role', 'listitem');
        li.setAttribute('data-task-id', task.id);
        li.setAttribute('aria-label', task.title + (task.completed ? ' (completed)' : ' (active)'));

        const checkbox = document.createElement('div');
        checkbox.className = 'task-item__checkbox';
        checkbox.setAttribute('aria-hidden', 'true');

        const tick = document.createElement('span');
        tick.className = 'task-item__checkbox-tick';
        tick.textContent = '✓';
        checkbox.appendChild(tick);

        const titleEl = document.createElement('span');
        titleEl.className = 'task-item__title';
        titleEl.textContent = task.title;

        li.appendChild(checkbox);
        li.appendChild(titleEl);

        li.addEventListener('click', () => handleToggleTaskComplete(task.id));

        return li;
      }

      function renderTaskList() {
        const visibleTasks = getFilteredTaskList();
        DOMRefs.taskList.innerHTML = '';

        if (visibleTasks.length === 0) {
          DOMRefs.emptyState.style.display = 'flex';
        } else {
          DOMRefs.emptyState.style.display = 'none';
          visibleTasks.forEach(task => {
            DOMRefs.taskList.appendChild(renderTaskListItem(task));
          });
        }
      }

      function renderTaskCount() {
        const remaining = countRemainingTasks();
        DOMRefs.taskCountNumber.textContent = remaining;
        DOMRefs.taskCountPlural.textContent = remaining === 1 ? '' : 's';
      }

      function renderFilterButtons() {
        DOMRefs.filterBtns.forEach(btn => {
          const isActive = btn.getAttribute('data-filter') === AppState.currentFilter;
          btn.classList.toggle('filter-btn--active', isActive);
        });
      }

      function updateUI() {
        renderTaskList();
        renderTaskCount();
        renderFilterButtons();
      }

      // ── Event Handlers ─────────────────────────────────────────
      function handleAddTask() {
        const title = DOMRefs.taskInputField.value.trim();
        if (!title) return;
        AppState.tasks.push(createTaskObject(title));
        DOMRefs.taskInputField.value = '';
        DOMRefs.taskInputField.focus();
        updateUI();
      }

      function handleToggleTaskComplete(taskId) {
        const task = AppState.tasks.find(t => t.id === taskId);
        if (task) task.completed = !task.completed;
        updateUI();
      }

      function handleFilterChange(filter) {
        AppState.currentFilter = filter;
        updateUI();
      }

      // ── Event Listeners ────────────────────────────────────────
      DOMRefs.btnAddTask.addEventListener('click', handleAddTask);

      DOMRefs.taskInputField.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') handleAddTask();
      });

      DOMRefs.filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          handleFilterChange(btn.getAttribute('data-filter'));
        });
      });

      // ── Initial Render ─────────────────────────────────────────
      updateUI();
    </script>
  </body>
</html>
